---
layout: default
title: Pictures
permalink: /pictures
---

<h1 class="section-title">Pictures</h1>

<div class="grid-container">
  {% assign sorted_pictures = site.pictures | sort: 'date' | reverse %}
  {% for item in sorted_pictures %}
    <div class="thumbnail-card" onclick="openLightbox({{ forloop.index0 }})">
      <div class="thumbnail-img">
        <img src="{{ site.baseurl }}{{ item.image }}" alt="{{ item.title }}">
      </div>
    </div>
  {% endfor %}
</div>

<!-- Simple Lightbox Container -->
<div id="lightbox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; flex-direction:column; padding:20px;">
  <!-- Close Button -->
  <div style="position:absolute; top:20px; right:20px; color:white; font-size:30px; cursor:pointer; z-index:1001;" onclick="closeLightbox()">&times;</div>
  
  <!-- Navigation Buttons -->
  <div style="position:absolute; top:50%; left:20px; transform:translateY(-50%); color:white; font-size:40px; cursor:pointer; user-select:none; z-index:1001; padding:20px;" onclick="changeImage(-1)">&#10094;</div>
  <div style="position:absolute; top:50%; right:20px; transform:translateY(-50%); color:white; font-size:40px; cursor:pointer; user-select:none; z-index:1001; padding:20px;" onclick="changeImage(1)">&#10095;</div>

  <div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column;" onclick="closeLightbox(event)">
    <img id="lightbox-img" style="max-width:90%; max-height:80%; object-fit:contain; margin-bottom:20px;" onclick="event.stopPropagation()">
    <div style="text-align:center;" onclick="event.stopPropagation()">
      <h3 id="lightbox-title" style="margin-bottom:0px;"></h3>
    </div>
  </div>
</div>

<script>
  let currentIndex = 0;
  const items = [
    {% for item in sorted_pictures %}
      {
        src: '{{ site.baseurl }}{{ item.image }}',
        title: '{{ item.title }}'
      }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  function openLightbox(index) {
    currentIndex = index;
    updateLightbox();
    document.getElementById('lightbox').style.display = 'flex';
    document.body.style.overflow = 'hidden'; // Prevent scrolling
  }

  function closeLightbox(event) {
    if (!event || event.target === event.currentTarget) {
      document.getElementById('lightbox').style.display = 'none';
      document.body.style.overflow = 'auto';
    }
  }

  function changeImage(step) {
    currentIndex += step;
    if (currentIndex >= items.length) currentIndex = 0;
    if (currentIndex < 0) currentIndex = items.length - 1;
    updateLightbox();
  }

  function updateLightbox() {
    const item = items[currentIndex];
    document.getElementById('lightbox-img').src = item.src;
    document.getElementById('lightbox-title').innerText = item.title;
  }

  // Keyboard navigation
  document.addEventListener('keydown', function(e) {
    if (document.getElementById('lightbox').style.display === 'flex') {
      if (e.key === 'ArrowLeft') changeImage(-1);
      if (e.key === 'ArrowRight') changeImage(1);
      if (e.key === 'Escape') closeLightbox();
    }
  });

  // Basic Swipe Support
  let touchstartX = 0;
  let touchendX = 0;
  
  const lightbox = document.getElementById('lightbox');
  lightbox.addEventListener('touchstart', e => {
    touchstartX = e.changedTouches[0].screenX;
  });

  lightbox.addEventListener('touchend', e => {
    touchendX = e.changedTouches[0].screenX;
    handleGesture();
  });

  function handleGesture() {
    if (touchendX < touchstartX - 50) changeImage(1);
    if (touchendX > touchstartX + 50) changeImage(-1);
  }
</script>
