  function openLightbox(index) {
    currentIndex = index;
    updateLightbox();
    document.getElementById('lightbox').style.display = 'flex';
    document.body.style.overflow = 'hidden'; // Prevent scrolling
  }

  function closeLightbox(event) {
    if (!event || event.target === event.currentTarget) {
      document.getElementById('lightbox').style.display = 'none';
      document.body.style.overflow = 'auto';
    }
  }

  function changeImage(step) {
    currentIndex += step;
    if (currentIndex >= items.length) currentIndex = 0;
    if (currentIndex < 0) currentIndex = items.length - 1;
    updateLightbox();
  }

  function updateLightbox() {
    const item = items[currentIndex];
    document.getElementById('lightbox-img').src = item.src;
    document.getElementById('lightbox-title').innerText = item.title;
  }

  // Keyboard navigation
  document.addEventListener('keydown', function(e) {
    if (document.getElementById('lightbox').style.display === 'flex') {
      if (e.key === 'ArrowLeft') changeImage(-1);
      if (e.key === 'ArrowRight') changeImage(1);
      if (e.key === 'Escape') closeLightbox();
    }
  });

  // Basic Swipe Support
  let touchstartX = 0;
  let touchendX = 0;

  const lightbox = document.getElementById('lightbox');
  lightbox.addEventListener('touchstart', e => {
    touchstartX = e.changedTouches[0].screenX;
  });

  lightbox.addEventListener('touchend', e => {
    touchendX = e.changedTouches[0].screenX;
    handleGesture();
  });

  function handleGesture() {
    if (touchendX < touchstartX - 50) changeImage(1);
    if (touchendX > touchstartX + 50) changeImage(-1);
  }

  <script>
    const hamburger = document.getElementById('hamburger');
    const mobileNav = document.getElementById('mobileNav');

    hamburger.addEventListener('click', function(e) {
      e.stopPropagation();
      mobileNav.classList.toggle('active');
    });

    // Close menu when clicking outside
    document.addEventListener('click', function(e) {
      if (mobileNav.classList.contains('active') && !mobileNav.contains(e.target)) {
        mobileNav.classList.remove('active');
      }
    });

    // Close menu when clicking a nav item
    const navItems = mobileNav.querySelectorAll('.nav-item');
    navItems.forEach(item => {
      item.addEventListener('click', () => {
        mobileNav.classList.remove('active');
      });
    });
  </script>
