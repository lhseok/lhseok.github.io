<!-- Simple Lightbox Container -->
<div id="lightbox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; flex-direction:column; padding:20px;" onclick="this.style.display='none'">

  </div>

<script>
  function openLightbox(src, title) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox-title').innerText = title;
    document.getElementById('lightbox').style.display = 'flex';
  }
</script>

  <script>
    const hamburger = document.getElementById('hamburger');
    const mobileNav = document.getElementById('mobileNav');

    hamburger.addEventListener('click', function(e) {
      e.stopPropagation();
      mobileNav.classList.toggle('active');
    });

    // Close menu when clicking outside
    document.addEventListener('click', function(e) {
      if (mobileNav.classList.contains('active') && !mobileNav.contains(e.target)) {
        mobileNav.classList.remove('active');
      }
    });

    // Close menu when clicking a nav item
    const navItems = mobileNav.querySelectorAll('.nav-item');
    navItems.forEach(item => {
      item.addEventListener('click', () => {
        mobileNav.classList.remove('active');
      });
    });
  </script>
