<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Mobile Header -->
  <header class="mobile-header">
    <a href="{{ site.baseurl }}/" class="logo">leehoseok</a>
    <div class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </header>

  <!-- Mobile Navigation Curtain -->
  <nav class="mobile-nav" id="mobileNav">
    <a href="{{ site.baseurl }}/blog" class="nav-item">/archive</a>
    <a href="{{ site.baseurl }}/projects" class="nav-item">/project</a>
    <a href="{{ site.baseurl }}/drawings" class="nav-item">/drawing</a>
    <a href="{{ site.baseurl }}/pictures" class="nav-item">/picture</a>
    <a href="{{ site.baseurl }}/about" class="nav-item">/about</a>
    <a href="mailto:{{ site.email }}" class="nav-item">/contact</a>
  </nav>

  <div class="wrapper">
    <!-- Desktop Sidebar -->
    <aside class="sidebar">
      <div>
        <div class="logo">
          <a href="{{ site.baseurl }}/">leehoseok</a>
        </div>
        <ul class="nav-menu">
          <li {% if page.url contains '/blog' %}class="active"{% endif %}><a href="{{ site.baseurl }}/blog">/archive</a></li>
          <li {% if page.url contains '/projects' %}class="active"{% endif %}><a href="{{ site.baseurl }}/projects">/project</a></li>
          <li {% if page.url contains '/drawings' %}class="active"{% endif %}><a href="{{ site.baseurl }}/drawings">/drawing</a></li>
          <li {% if page.url contains '/pictures' %}class="active"{% endif %}><a href="{{ site.baseurl }}/pictures">/picture</a></li>
        </ul>
      </div>

      <div class="sidebar-footer">
        <a href="{{ site.baseurl }}/about" class="nav-item">/about</a>
        <a href="mailto:{{ site.email }}" class="nav-item">/contact</a>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      {{ content }}
    </main>
  </div>

  <script>
    const hamburger = document.getElementById('hamburger');
    const mobileNav = document.getElementById('mobileNav');

    hamburger.addEventListener('click', function(e) {
      e.stopPropagation();
      mobileNav.classList.toggle('active');
    });

    // Close menu when clicking outside
    document.addEventListener('click', function(e) {
      if (mobileNav.classList.contains('active') && !mobileNav.contains(e.target)) {
        mobileNav.classList.remove('active');
      }
    });

    // Close menu when clicking a nav item
    const navItems = mobileNav.querySelectorAll('.nav-item');
    navItems.forEach(item => {
      item.addEventListener('click', () => {
        mobileNav.classList.remove('active');
      });
    });
  </script>
</body>
</html>
