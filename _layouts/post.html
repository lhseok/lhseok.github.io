---
layout: default
---

<article class="post">
  <header class="post-header">
    <div class="post-date">{{ page.date | date: "%Y년 %m월 %d일" }}</div>
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-tags">
      {% for tag in page.tags %}
        <a href="{{ site.baseurl }}/blog?tag={{ tag }}" class="tag-item">#{{ tag }}</a>
      {% endfor %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
