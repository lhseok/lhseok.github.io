---
layout: default
---

<article class="project-detail">
  <header style="margin-bottom: 60px;">
    <h1 style="font-size: 40px; font-weight: 800; margin-bottom: 10px;">{{ page.title }}</h1>
    <p style="font-size: 18px; color: #888;">{{ page.description }}</p>
  </header>

  {% assign header_img = page.header_image | default: page.thumbnail %}
  {% if header_img %}
    <div style="margin-bottom: 60px;">
      <img src="{{ site.baseurl }}{{ header_img }}" alt="{{ page.title }}" style="max-width: 100%; border: 1px solid #333;">
    </div>
  {% endif %}

  <div class="project-content" style="font-size: 17px; line-height: 1.8; color: #ccc;">
    {{ content | replace: ' | ', '<span class="pipe-separator">|</span>' | replace: ' \| ', '<span class="pipe-separator">|</span>' }}
  </div>
</article>
